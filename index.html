<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputlandia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="container pt-5">
        <div class="bg-light">
            <p>Payment from exmple</p>
        </div>

        <div class="container">
            <div class="p-3 mb-5 bg-danger-subtle border border-danger rounded-3">
                Example element with utilities


            </div>
        </div>
        <!-- contenido para pagar-->
        <div class="row ms-2 me-2">
            <div class="col-5">


                <label class="form-label" for="card">#Card</label>
                <input class="form-control" type="text" id="card" placeholder="XXXXXXXX" />


            </div>

            <div class="col-3">


                <label class="form-label" for="cvc">#CVC</label>
                <input class="form-control" type="text" id="cvc" placeholder="0000" />


            </div>

            <div class="col-4">


                <label for="amount" for="amount">Amount</label>

                <div class="input-group pt-2">
                    <span class="input-group-text">$</span>
                    <input type="text" id="amount" placeholder="Amount" class="form-control"
                        aria-label="Amount (to the nearest dollar)">

                </div>

            </div>

            <div class="col-6">

                

                    <label class="form-label" for="firstName">First Name</label>
                    <input class="form-control" type="text" id="firstName"  />
                

            </div>

            <div class="col-6">

                

                    <label class="form-label" for="lasttName">Last Name</label>
                    <input class="form-control" type="text" id="lasttName" />
                

            </div>

            <div class="col-6">

                

                    <label class="form-label" for="city">City</label>
                    <input class="form-control" type="text" id="city" />
                

            </div>


             <div class="col-3">

                

                    <label class="form-label" for="state">State</label>
                    <select>Pick a State</select>
                

            </div>
            
            <div class="col-3">

                

                    <label class="form-label" for="postalCode">Postal Code</label>
                    <input class="form-control" type="selct" id="postalCode" />
                

            </div>
            

            

            





        </div>
        <div class="container pt-3">
            <div class="bg-light">
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <button class="btn btn-secondary me-md-2" type="button">Cancel</button>
                    <button class="btn btn-primary" type="button">Send</button>
                </div>
            </div>

        </div>















    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
